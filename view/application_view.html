<!DOCTYPE html>
<html lang="ru">
<head>
    <meta  name="viewport"  content="width=device-width, initial-scale=0.7, viewport-fit=cover" />
    <meta charset="UTF-8">
    <title>Просмотр заявки</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .modal {
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }
        .modal h2 {
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input, textarea {
            width: 96%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .submit-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
        }
        .status-controls button {
            margin-right: 10px;
            padding: 10px 16px;
            border: 1px solid #aaa;
            border-radius: 6px;
            background: #f4f4f4;
            cursor: pointer;
        }
        .status-controls button.active {
            background-color: #28a745;
            color: white;
            cursor: default;
        }
        .download button{
            margin-right: 10px;
            padding: 10px 16px;
            border: 1px solid #aaa;
            border-radius: 6px;
            background: #f4f4f4;
            cursor: pointer;
        }
        .download button.active{
            background-color: #28a745;
            color: white;
            cursor: default;
        }
    </style>
</head>
<body>
<div class="modal">
    <span class="close" onclick="window.location.href='main_view.html'">&times;</span>
    <h2>Заявка системному администратору</h2>
    <div class="form-group">
        <label>Название:</label>
        <input type="text" id="title" disabled>
    </div>
    <div class="form-group">
        <label>Кабинет:</label>
        <input type="text" id="cabinet" disabled>
    </div>
    <div class="form-group">
        <label>Описание:</label>
        <textarea id="description" rows="3" disabled style="min-height: 20px; max-height: 210px; max-width: 96%; min-width: 96%;"></textarea>
    </div>
    <div class="form-group" style="display: flex; flex-direction: row; flex-wrap: nowrap; margin-bottom: 0px">
        <div class="form-group">
            <label>Дата подачи:</label>
            <input type="text" id="date_submission" style="width: 90%;" disabled>
        </div>
        <div class="form-group">
            <label>Дата завершения:</label>
            <input type="text" id="date_completion" style="width: 92%;" disabled>
        </div>
    </div>
    <div class="form-group">
        <label>Приоритет:</label>
        <input type="text" id="priority" disabled>
    </div>
    <div class="form-group">
        <label>Текущий статус:</label>
        <input type="text" id="status" disabled>
    </div>
    <div style="display: flex; flex-direction: row-reverse; justify-content: space-between; align-items: center;">
        <div class="form-group status-controls" style="margin-top: 33px; justify-self: end;">
            <button onclick="downloadDocx()"
                    style="margin-right: 10px; padding: 10px 16px; border: 1px solid #aaa; border-radius: 6px; background: #f4f4f4; cursor: pointer;">
                Скачать заявку
            </button>
        </div>
        <div class="form-group status-controls" id="admin-controls" style="display:none">
            <label>Изменить статус:</label><br>
            <div id="status-buttons" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const isAdmin = urlParams.get('admin') === 'true';

    const statuses = ['Новая', 'В работе', 'Завершена'];

    fetch(`/applications/${id}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('title').value = data.title;
            document.getElementById('cabinet').value = data.cabinet_number;
            document.getElementById('description').value = data.problem_description;
            document.getElementById('date_submission').value = data.date_submission;
            document.getElementById('date_completion').value = data.date_completion;
            document.getElementById('priority').value = ['Низкий', 'Средний', 'Высокий'][data.id_priority - 1];
            document.getElementById('status').value = statuses[data.id_status - 1];

            if (isAdmin && data.id_status < 3) {
                const container = document.getElementById("status-buttons");
                statuses.forEach((name, index) => {
                    const statusIndex = index + 1;

                    if (data.id_status === 2 && statusIndex === 1) return;
                    if (statusIndex === data.id_status) {
                        const btn = document.createElement("button");
                        btn.textContent = name;
                        btn.classList.add("active");
                        container.appendChild(btn);
                    } else {
                        const btn = document.createElement("button");
                        btn.textContent = name;
                        btn.onclick = () => changeStatus(statusIndex);
                        container.appendChild(btn);
                    }
                });
                document.getElementById('admin-controls').style.display = 'block';
            }
        });

    function downloadDocx() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        window.location.href = `/applications/${id}/export`;
    }

    function changeStatus(newStatus) {
        fetch(`/applications/${id}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ new_status: newStatus })
        })
        .then(res => res.json())
        .then(() => window.location.reload());
    }
</script>
</body>
</html>
